- plugins:
      - plugins/dotbot-if

- defaults:
      link:
          relink: true
          force: true
          create: true

- clean: ["~"]

- clean:
      ~/:
          force: true
      ~/.config:
          recursive: true

- link:
      ~/.vim/vimrc: ./configs/vimrc
      ~/.config/waybar: ./configs/waybar
      ~/.config/swaync: ./configs/swaync
      ~/.config/zsh/.zshrc: ./configs/zshrc
      ~/.config/nvim: ./configs/nvim
      ~/.config/tmux/tmux.conf: ./configs/tmux.conf
      ~/.config/git/config: ./configs/gitconfig
      ~/.config/git/ignore: ./configs/gitignore
      ~/.config/copyq/copyq.conf: ./configs/copyq.conf
      ~/.config/hypr/hyprland.conf: ./configs/hypr/hyprland.conf
      ~/.config/hypr/hyprpaper.conf: ./configs/hypr/hyprpaper.conf
      ~/.config/hypr/scripts: ./configs/hypr/scripts
      ~/.config/hypr/wallpapers: ./wallpapers
      ~/.config/kitty/kitty.conf: ./configs/kitty.conf
      ~/.config/nixpkgs/config.nix: ./configs/nixpkgs/config.nix
      ~/.config/gtk-3.0/settings.ini: ./configs/gtk-3.0/settings.ini
      ~/.config/gtk-4.0/settings.ini: ./configs/gtk-4.0/settings.ini
      ~/.config/wezterm/wezterm.lua: ./configs/wezterm/wezterm.lua
      ~/.config/io.datasette.llm/default_model.txt: ./configs/io.datasette.llm/default_model.txt
      ~/.config/io.datasette.llm/templates: ./configs/io.datasette.llm/templates
      ~/.config/fuzzel/fuzzel.ini: ./configs/fuzzel/fuzzel.ini
      ~/.local/share/applications/custom: ./applications
      ~/.config/mpv/input.conf: ./configs/mpv/input.conf
      ~/.config/mpv/scripts: ./configs/mpv/scripts
      ~/.config/yazi: ./configs/yazi
      ~/.config/mimeapps.list: ./configs/mimeapps.list
      ~/.config/sheldon/plugins.toml: ./configs/sheldon/plugins.toml
      ~/.npmrc: ./configs/npmrc
      ~/.claude/CLAUDE.md: ./configs/claude/claude.md
      ~/.claude/settings.json: ./configs/claude/settings.json
      ~/.claude/scripts: ./configs/claude/scripts
      ~/.claude/keybindings.json: ./configs/claude/keybindings.json
      ~/.claude/skills/tmux-cowork: ./configs/claude/skills/tmux-cowork
      ~/.claude/skills/unattended: ./configs/claude/skills/unattended
      ~/.local/bin/xdg-open: ./configs/bin/xdg-open
      ~/.ssh/config: ./configs/ssh/config
      ~/.config/zellij/config.kdl: ./configs/zellij/config.kdl
      ~/.config/zellij/plugins: ./configs/zellij/plugins
      ~/.config/foot/foot.ini: ./configs/foot/foot.ini
      ~/.config/ghostty/config: ./configs/ghostty/config
      ~/.config/yazi/plugins/first-file.yazi: ./configs/yazi/custom-plugins/first-file.yazi
      ~/.config/helix/config.toml: ./configs/helix/config.toml
      ~/.config/libreoffice/4/user/registrymodifications.xcu: ./configs/libreoffice/registrymodifications.xcu

# create custom and monitors conf if doesnt exist
- if:
      cond: "[ ! -f ~/.config/hypr/custom.conf ]"
      met:
          - shell:
                - touch  ~/.config/hypr/custom.conf

- if:
      cond: "[ ! -f ~/.config/hypr/monitors.conf ]"
      met:
          - shell:
                - touch ~/.config/hypr/monitors.conf
