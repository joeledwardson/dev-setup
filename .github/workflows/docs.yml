name: Deploy Docs (Rspress)

# Builds the Rspress docs in mdx-docs/ and deploys to GitHub Pages.
# Replaces the old mkdocs `gh-deploy` flow. Requires repo Settings → Pages →
# Source: "GitHub Actions" (one-time change from the old gh-pages-branch source).

on:
  push:
    branches: [main]
    paths:
      - 'mdx-docs/**'
      - '.github/workflows/docs.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deploy; don't cancel an in-progress run.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mdx-docs
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: mdx-docs/package-lock.json

      - run: npm ci

      # DOCS_BASE makes Rspress prefix asset URLs with /dev-setup/ (project page).
      - run: npm run build
        env:
          DOCS_BASE: /dev-setup/

      - uses: actions/upload-pages-artifact@v3
        with:
          path: mdx-docs/doc_build

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
