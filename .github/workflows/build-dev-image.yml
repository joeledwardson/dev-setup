name: build dev image

# Builds dev-image/Dockerfile.dev and pushes to GitHub Container Registry.
# - push to main  → :latest
# - push a tag    → :latest + :<tag>

on:
  push:
    branches: [main]
    tags: ['*']

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # tags: always :latest; also :<ref> when the trigger is a git tag
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/dev-image
          tags: |
            type=raw,value=latest
            type=ref,event=tag

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: dev-image/Dockerfile.dev
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
