setw -g mode-keys vi
# Terminal setup
set -g default-terminal "tmux-256color"
set-option -sa terminal-overrides ",xterm-256color:RGB"
set-option -sa terminal-overrides ',xterm*:sitm=\E[3m' # Italic support
set-option -s terminal-features 'kitty:RGB'

# for image.nvim
set -gq allow-passthrough on
set -g visual-activity off
set -g set-titles on
# Prefix "CLAUDE! " when ANY window has a pending Claude session (set/cleared by
# configs/tmux/scripts/claude-flag.sh). #H:#S = hostname:session.
set -g set-titles-string '#{?#{@claude_any},CLAUDE! ,}#H:#S'
set -g focus-events on   # required for the pane-focus-in hook that clears the marker
set -g @claude_any ''    # global flag: is any Claude session pending? (drives the title)



# allow mouse scrolling
set -g mouse on

# dont prompt before kill
bind-key & kill-window
bind-key x kill-pane

# remap prefix
unbind C-b
set-option -g prefix C-a
bind-key C-a send-prefix

# stop mouse selection defaults for copy mode
unbind-key -T copy-mode-vi MouseDragEnd1Pane
unbind -T copy-mode-vi MouseDown1Pane
unbind-key -T copy-mode MouseDragEnd1Pane
unbind -T copy-mode MouseDown1Pane


# Start windows and panes at 1, not 0
set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-windows on

# Enhanced clipboard support (add to your tmux.conf)
set -g set-clipboard on
set -ga terminal-features ",xterm*:clipboard"

# Conditional clipboard settings
if-shell "uname -r | grep -i microsoft" {
    # WSL-specific settings (remove carriage returns from stupid windows newlines)
    bind-key -T copy-mode-vi v send-keys -X begin-selection
    bind-key -T copy-mode-vi y send-keys -X copy-pipe "/tr -d '\r' | mnt/c/Windows/System32/clip.exe"
    bind-key -T copy-mode-vi Enter send-keys -X copy-pipe-and-cancel "/tr -d '\r' | mnt/c/Windows/System32/clip.exe"
} {
    # Non-WSL settings (Linux/MacOS)
    bind-key -T copy-mode-vi v send-keys -X begin-selection
    bind-key -T copy-mode-vi y send-keys -X copy-pipe "xclip -selection clipboard -i"
    bind-key -T copy-mode-vi Enter send-keys -X copy-pipe-and-cancel "xclip -selection clipboard -i"
}

# special key to search backwards for text inside code blocks
bind-key C-g copy-mode ';' \
    send-keys -X clear-selection ';' \
    send-keys -X cursor-up ';' \
    send-keys -X search-backward "```" ';' \
    send-keys -X cursor-left ';' \
    send-keys -X begin-selection ';' \
    send-keys -X search-backward "```" ';' \
    send-keys -X cursor-down


# When already in copy-mode (no prefix needed)
bind-key -T copy-mode-vi C-g \
    send-keys -X clear-selection \; \
    send-keys -X cursor-up \; \
    send-keys -X search-backward "```" \; \
    send-keys -X cursor-left \; \
    send-keys -X begin-selection \; \
    send-keys -X search-backward "```" \; \
    send-keys -X cursor-down


bind-key -T copy-mode-vi C-G \
    send-keys -X clear-selection \; \
    send-keys 


# When already in copy-mode (no prefix needed)
bind-key -T copy-mode-vi C-m \
    send-keys -X end-of-selection \; \
    send-keys -X cursor-down \; \
    send-keys -X clear-selection \; \
    send-keys -X search-forward "```" \; \
    send-keys -X cursor-down \; \
    send-keys -X begin-selection \; \
    send-keys -X search-forward "```" \; \
    send-keys -X cursor-up

# manually set vim pane navigation
# if zoomed: unzoom first then move; otherwise: flash border at edge or move
bind -n M-h if -F '#{window_zoomed_flag}' \
  'resize-pane -Z ; select-pane -L' \
  'if -F "#{pane_at_left}" "run -b \"~/.config/tmux/scripts/flash-red.sh\"" "select-pane -L"'
bind -n M-j if -F '#{window_zoomed_flag}' \
  'resize-pane -Z ; select-pane -D' \
  'if -F "#{pane_at_bottom}" "run -b \"~/.config/tmux/scripts/flash-red.sh\"" "select-pane -D"'
bind -n M-k if -F '#{window_zoomed_flag}' \
  'resize-pane -Z ; select-pane -U' \
  'if -F "#{pane_at_top}" "run -b \"~/.config/tmux/scripts/flash-red.sh\"" "select-pane -U"'
bind -n M-l if -F '#{window_zoomed_flag}' \
  'resize-pane -Z ; select-pane -R' \
  'if -F "#{pane_at_right}" "run -b \"~/.config/tmux/scripts/flash-red.sh\"" "select-pane -R"'


# Split panes using | and -
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# Also override the default split + new-window bindings so panes always inherit
# the current path. Default `%`, `"`, and `c` ignore pane_current_path and dump
# you in the directory tmux was started in.
bind '"' split-window -v -c "#{pane_current_path}"
bind '%' split-window -h -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"

# vim style window switching
bind -n M-a if -F '#{==:#{window_index},1}' 'run -b "~/.config/tmux/scripts/flash-red.sh"' previous-window
bind -n M-d if -F '#{==:#{window_index},#{session_windows}}' 'run -b "~/.config/tmux/scripts/flash-red.sh"' next-window

bind-key -n M-H resize-pane -L 5
bind-key -n M-J resize-pane -D 5
bind-key -n M-K resize-pane -U 5
bind-key -n M-L resize-pane -R 5


# Alt-/ to enter vi-style copy mode and start reverse search
bind -n M-/ copy-mode ';' send-keys ?\;

bind -n M-c copy-mode

# Jump to the next window with a pending Claude session (the CLAUDE! marker). Prefix + k.
bind-key k run-shell "~/.config/tmux/scripts/claude-next.sh"

# Alt-Shift-E to dump pane scrollback into $EDITOR (zellij parity)
bind -n M-E run-shell "~/.config/tmux/scripts/edit-scrollback.sh"

# Navigation bindings
bind -T copy-mode-vi C-n send-keys -X cursor-down \; \
    send-keys -X next-prompt \; \
    send-keys -X cursor-up
bind -T copy-mode-vi C-p send-keys -X previous-prompt \; \
    send-keys -X cursor-up
bind C-p copy-mode ';' \
    send-keys -X begin-selection ';' \
    send-keys -X previous-prompt ';' \
    send-keys -X cursor-up



# C-v sometimes doesnt work for rectangle toggle when on windows
bind -T copy-mode-vi C-r send-keys -X rectangle-toggle


# List of plugins
set -g @plugin 'tmux-plugins/tmux-copycat'
set -g @plugin 'wfxr/tmux-fzf-url'
# Copy picked URLs via OSC52 instead of wl-copy/xclip. `load-buffer -w` makes tmux
# emit the OSC52 escape to the attached client (needs set-clipboard on, above), so
# it works on headless/SSH sessions with no Wayland/X vars. The URL arrives on stdin.
set -g @fzf-url-copy-cmd 'tmux load-buffer -w -'
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'catppuccin/tmux#v2.1.2' # See https://github.com/catppuccin/tmux/tags for additional tags
set -g @plugin 'xamut/tmux-weather'
set -g @plugin 'tmux-plugins/tmux-cpu'

# cpu/ram — stay normal color below 80%, go red above
set -g @cpu_high_percent 80
set -g @cpu_low_fg_color    "#[fg=#{@thm_teal}]"
set -g @cpu_medium_fg_color "#[fg=#{@thm_teal}]"
set -g @cpu_high_fg_color   "#[fg=colour9]"

set -g @ram_high_percent 80
set -g @ram_low_fg_color    "#[fg=#{@thm_sky}]"
set -g @ram_medium_fg_color "#[fg=#{@thm_sky}]"
set -g @ram_high_fg_color   "#[fg=colour9]"
set -g @plugin 'tmux-plugins/tmux-resurrect'
# set resurrect programs (strip neovim args, might break specific commands but removes all the extra shite)
set -g @resurrect-processes 'vim "~nvim->nvim" npm ssh psql claude llm python pomodoro uv task codex just' 
# for vim (dont use nvim strategy as we handle sessions ourselves)
set -g @resurrect-strategy-vim 'session'

# set theme
set -g @catppuccin_flavor 'mocha' # latte, frappe, macchiato or mocha

# use window name if NOT zsh (i.e. set by user) otherwise automatic title name, and add Z if zoomed
# "CLAUDE! " prefix in the window tab when that window has a pending Claude session
set -g @catppuccin_window_text "#{?#{@claude_pending},CLAUDE! ,}#{?#{!=:#W,zsh},#W,#T}#{?window_zoomed_flag, Z,}"
set -g @catppuccin_window_current_text "#{?#{@claude_pending},CLAUDE! ,}#{?#{!=:#W,zsh},#W,#T}#{?window_zoomed_flag, Z,}"
set -g @catppuccin_window_status_style "rounded"

# Enable border status
set -q @catppuccin_pane_border_status "yes"
set -g @catppuccin_pane_border_status "top"
# (pane-border-style / pane-active-border-style are set after `run tpm` below
#  so they override whatever catppuccin tries to apply.)

# Make the status line pretty and add some modules
set -g status-right-length 100
set -g status-left-length 100

set -g status-left ""
set -g status-right ""


# session
set -ga status-right "#[fg=#{@thm_green},bg=default]"
set -ga status-right "#{?client_prefix,#[#{fg=#{@thm_green}}]#[reverse]#[bold],}"
set -ga status-right " #{?#{e|>:#{window_width},90}, #S,} "
set -ga status-right "#{?client_prefix,#[none],}"


# hostname
set -ga status-right "#[fg=#{@thm_sky},bg=default]"
set -ga status-right " #{host} "


# application
set -ga status-right "#[fg=#{@thm_maroon},bg=default]"
set -ga status-right " #{?#{e|>:#{window_width},80}, #{pane_current_command},} "


# directory
set -ga status-right "#[fg=#{@thm_blue},bg=default]"
set -ga status-right " #{?#{e|>:#{window_width},80}, #{=/24/...:#{b:pane_current_path}},} "


# window zoom flag
set -ga status-right "#{?window_zoomed_flag,"
set -ga status-right "#[fg=#{@thm_yellow}]#[bg=default]"
set -ga status-right " #{?#{e|>:#{window_width},110}, zoom,} "

set -ga status-right ",}"

# pane marked flag
set -ga status-right "#{?pane_marked,"
set -ga status-right "#[fg=#{@thm_yellow}]#[bg=default]"
set -ga status-right " #{?#{e|>:#{window_width},110}, marked,} "

set -ga status-right ",}"

# cpu
set -ga status-right "#{cpu_fg_color}"
set -ga status-right " #{?#{e|>:#{window_width},115}, #{cpu_percentage},} "


# ram — colour from plugin (red above 80%, sky otherwise)
set -ga status-right "#{ram_fg_color}"
set -ga status-right " #{?#{e|>:#{window_width},115}, #{ram_percentage},} "


set-window-option -g automatic-rename on

# Set the foreground/background color for the active window
setw -g window-active-style fg=colour15,bg=colour235

# Set the foreground/background color for all other windows
setw -g window-style fg=colour245,bg=colour236,nobold,nodim,noreverse

set-window-option -g window-status-format "#[fg=white,bold,italics]#{window_index}"
set-window-option -g window-status-current-format "#[fg=green,bold,italics]#{window_index}"
set-option -ga terminal-overrides ",*:Tc"

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'

# Pane borders — set AFTER tpm so @thm_* user options are available
# (catppuccin defines them). scripts/flash-red.sh captures and restores
# pane-active-border-style at flash time, so it must be set here.
set -gF pane-border-style        "fg=#{@thm_overlay_0}"
set -gF pane-active-border-style "fg=#{@thm_lavender}"

# Scroll indicator + mode style — set AFTER tpm to override catppuccin
set -g status-left "#{?pane_in_mode,#[bg=#f38ba8 fg=#1e1e2e bold]  SCROLL  #[default],}"


set-hook -g pane-mode-changed 'if -F "#{==:#{pane_mode},copy-mode}" "select-pane -P bg=#3b0000" "select-pane -P default"'

# Clear a window's pending-Claude marker when you move to it (+ recompute the title flag).
# pane-focus-in isn't a hook in this tmux, so use the window/pane change hooks that are:
# session-window-changed fires on any window switch (M-a/M-d, number, tab click, prefix-!),
# after-select-pane on pane moves (M-h/j/k/l). Pass #{window_id} so the clear targets the
# window the hook fired on (reliable attached or not), not whatever client happens to be active.
set-hook -g session-window-changed 'run-shell "~/.config/tmux/scripts/claude-flag.sh seen #{window_id}"'
set-hook -g after-select-pane 'run-shell "~/.config/tmux/scripts/claude-flag.sh seen #{window_id}"'

