general {
    lock_cmd = swaylock -f
    before_sleep_cmd = swaylock -f
}

listener {
    timeout = 300        # 5 min → lock screen
    on-timeout = swaylock -f
}

# suspend removed — systemctl suspend with NVreg_PreserveVideoMemoryAllocations
# and powerManagement.enable=false causes NVIDIA driver corruption and full system hangs
