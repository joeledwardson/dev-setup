<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 660 300" font-family="-apple-system,Segoe UI,Roboto,sans-serif">
  <rect x="0" y="0" width="660" height="300" fill="#ffffff"/>
  <text x="50" y="24" font-size="15" font-weight="600" fill="#1a252f">CPU % over 24h — alert fires on a sustained breach, not a blip</text>

  <!-- plot area -->
  <rect x="50" y="40" width="570" height="200" fill="#fbfbfc" stroke="#d6dadf"/>

  <!-- breach window (sustained > 85%) -->
  <rect x="397" y="40" width="94" height="200" fill="#e74c3c" opacity="0.10"/>

  <!-- y gridlines + labels (CPU %) -->
  <g font-size="11" fill="#717d7e">
    <line x1="50" y1="40"  x2="620" y2="40"  stroke="#eceef1"/><text x="44" y="44"  text-anchor="end">100</text>
    <line x1="50" y1="90"  x2="620" y2="90"  stroke="#eceef1"/><text x="44" y="94"  text-anchor="end">75</text>
    <line x1="50" y1="140" x2="620" y2="140" stroke="#eceef1"/><text x="44" y="144" text-anchor="end">50</text>
    <line x1="50" y1="190" x2="620" y2="190" stroke="#eceef1"/><text x="44" y="194" text-anchor="end">25</text>
    <line x1="50" y1="240" x2="620" y2="240" stroke="#d6dadf"/><text x="44" y="244" text-anchor="end">0</text>
  </g>

  <!-- x labels (hours) -->
  <g font-size="11" fill="#717d7e" text-anchor="middle">
    <text x="50"  y="258">00h</text>
    <text x="192" y="258">06h</text>
    <text x="335" y="258">12h</text>
    <text x="477" y="258">18h</text>
    <text x="620" y="258">24h</text>
  </g>

  <!-- alert threshold (85%) -->
  <line x1="50" y1="70" x2="620" y2="70" stroke="#c0392b" stroke-width="1.5" stroke-dasharray="6 4"/>
  <text x="616" y="64" font-size="11" font-weight="600" fill="#c0392b" text-anchor="end">alert threshold · 85%</text>

  <!-- CPU series -->
  <polyline fill="none" stroke="#196f3d" stroke-width="2.5" stroke-linejoin="round"
    points="50,212 121,218 192,204 264,174 335,136 406,60 477,52 549,146 620,194"/>
  <g fill="#196f3d">
    <circle cx="50" cy="212" r="3"/><circle cx="121" cy="218" r="3"/><circle cx="192" cy="204" r="3"/>
    <circle cx="264" cy="174" r="3"/><circle cx="335" cy="136" r="3"/><circle cx="549" cy="146" r="3"/>
    <circle cx="620" cy="194" r="3"/>
  </g>
  <!-- breaching points in red -->
  <circle cx="406" cy="60" r="3.5" fill="#c0392b"/>
  <circle cx="477" cy="52" r="4" fill="#c0392b"/>

  <!-- the harmless blip, annotated -->
  <text x="264" y="166" font-size="10" fill="#717d7e" text-anchor="middle">30% blip — ignored</text>

  <!-- breach callout -> ntfy -->
  <line x1="477" y1="52" x2="500" y2="40" stroke="#c0392b" stroke-width="1"/>
  <rect x="500" y="30" width="116" height="20" rx="4" fill="#c0392b"/>
  <text x="558" y="44" font-size="11" font-weight="600" fill="#ffffff" text-anchor="middle">→ ntfy alert</text>
</svg>
