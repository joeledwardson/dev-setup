# https://taskfile.dev/
version: "3"

vars:
  WIN_DIR: win
  WINGET_FILE: "{{.WIN_DIR}}/winget.json"
  SCOOP_FILE: "{{.WIN_DIR}}/scoop.json"
  BRAVE_DIR: "{{.HOME}}/.config/BraveSoftware/Brave-Browser"
  BRAVE_FILE: "{{.BRAVE_DIR}}/Default/Preferences"
  BRAVE_LOCAL_STATE: "{{.BRAVE_DIR}}/Local State"

tasks:
  hyprland:
    internal: true
    status:
      - "! hyprctl activewindow &>/dev/null"
    cmds:
      - hyprctl reload

  os:build:
    desc: Rebuild NixOS configuration
    cmds:
      - sudo nixos-rebuild switch --flake .
      - task: hyprland

  os:clean:
    desc: Clean nix garbage
    cmds:
      - sudo nix-collect-garbage -d
      - nix-collect-garbage -d

  dotfiles:
    desc: Run dotbot and setup hyprland config
    cmds:
      - git submodule update --init
      - dotbot -c install.conf.yaml
      - task: hyprland

  sheldon:lock:
    desc: Rebuild sheldon plugin lock
    cmds:
      - sheldon lock

  sheldon:update:
    desc: Update sheldon packages
    cmds:
      - sheldon lock --update

  yazi:
    desc: Reset yazi plugins/flavors and reinstall (avoids stale state from partial pulls)
    cmds:
      - rm -rf configs/yazi/plugins configs/yazi/flavors
      - task: dotfiles
      - ya pkg install

  tpm:
    desc: Setup tmux plugin manager
    cmds:
      - git clone https://github.com/tmux-plugins/tpm "$HOME/.tmux/plugins/tpm"
      - tmux source-file ~/.config/tmux/tmux.conf
    status:
      - test -e "$HOME/.tmux/plugins/tpm"

  claude:init:
    desc: Initialize Claude Code config (skip onboarding prompt)
    cmds:
      - cp dev-image/claude.json ~/.claude.json
    status:
      - test -e ~/.claude.json

  toc:
    desc: Run doctoc on README
    cmds:
      - doctoc README.md

  win:push:
    desc: Export Windows packages
    cmds:
      - mkdir -p {{.WIN_DIR}}
      - winget export --nowarn --output "{{.WINGET_FILE}}" --include-versions
      - scoop export > "{{.SCOOP_FILE}}"

  win:pull:
    desc: Import Windows packages
    preconditions:
      - test -f "{{.WINGET_FILE}}"
      - test -f "{{.SCOOP_FILE}}"
    cmds:
      - winget import --accept-package-agreements --ignore-unavailable --accept-source-agreements --import-file "{{.WINGET_FILE}}"
      - scoop import "{{.SCOOP_FILE}}"

  brave:copy:
    desc: Copy Brave preferences to scratchpads
    preconditions:
      - test -f "{{.BRAVE_FILE}}"
    cmds:
      - mkdir -p scratchpads
      - cp "{{.BRAVE_FILE}}" ./scratchpads/brave-preferences.json
      - cat scratchpads/brave-preferences.json | prettierd scratchpads/brave-preferences.json > scratchpads/brave-preferences-formatted.json

  brave:apply:
    desc: Apply custom configs to every Brave profile listed in Local State
    preconditions:
      - sh: 'test -f "{{.BRAVE_LOCAL_STATE}}"'
        msg: "Brave Local State not found at {{.BRAVE_LOCAL_STATE}} — open Brave at least once first"
      - sh: 'pgrep -x brave >/dev/null && exit 1 || exit 0'
        msg: "Brave is running — close it first. Brave rewrites Preferences from memory on exit, which would undo this apply."
    cmds:
      - |
        # Brave persists profile dir names (e.g. "Default", "Profile 1") under
        # profile.info_cache in Local State. Iterate those rather than guessing
        # names like "Work-Profile" — profile dir != display name.
        jq -r '.profile.info_cache | keys[]' "{{.BRAVE_LOCAL_STATE}}" | while IFS= read -r profile_dir; do
          prefs="{{.BRAVE_DIR}}/$profile_dir/Preferences"
          if [ ! -f "$prefs" ]; then
            echo "SKIP: $profile_dir (no Preferences file)"
            continue
          fi
          tmpfile=$(mktemp)
          jq -s '.[0] * .[1]' "$prefs" ./configs/brave/custom.json > "$tmpfile"
          mv "$tmpfile" "$prefs"
          echo "OK:   $profile_dir"
        done

  brave:gen-commands:
    desc: Regenerate the IDC command-id → name lookup used by the nvim keybrowser
    cmd: ./configs/nvim/scripts/gen-brave-commands.sh

  brave:test:
    desc: E2E test that brave:apply lands Google search + Ctrl+Shift+F on every profile
    preconditions:
      - sh: 'test -f "{{.BRAVE_LOCAL_STATE}}"'
        msg: "Brave Local State not found at {{.BRAVE_LOCAL_STATE}} — open Brave at least once first"
      - sh: 'pgrep -x brave >/dev/null && exit 1 || exit 0'
        msg: "Brave is running — close it first. Brave rewrites Preferences from memory on exit, which would undo this apply."
    cmds:
      - task: brave:apply
      - |
        # Loop every profile dir, not just Default — the Work profile bug was
        # that we were silently skipping it, so the test has to cover every
        # profile to catch that class of regression.
        fail=0
        jq -r '.profile.info_cache | keys[]' "{{.BRAVE_LOCAL_STATE}}" | while IFS= read -r profile_dir; do
          prefs="{{.BRAVE_DIR}}/$profile_dir/Preferences"
          [ -f "$prefs" ] || continue
          echo "=== $profile_dir ==="

          # Google as default search
          for path in '.default_search_provider_data.template_url_data' '.brave.default_private_search_provider_data'; do
            short_name=$(jq -r "$path.short_name // empty" "$prefs")
            prepop_id=$(jq -r "$path.prepopulate_id // empty" "$prefs")
            if [ "$short_name" != "Google" ] || [ "$prepop_id" != "1" ]; then
              echo "FAIL: $path expected Google/1, got $short_name/$prepop_id"
              fail=1
            else
              echo "OK:   $path → $short_name (prepopulate_id=$prepop_id)"
            fi
          done

          # Ctrl+Shift+F bound to Find (IDC 37000) — needed because some sites
          # override Ctrl+F (e.g. github.com search overlay). Both shortcuts
          # must be in the array since Brave replaces the whole list.
          accel=$(jq -c '.brave.accelerators."37000" // []' "$prefs")
          if echo "$accel" | grep -q "Control+KeyF" && echo "$accel" | grep -q "Control+Shift+KeyF"; then
            echo "OK:   accelerators.37000 (Find) → $accel"
          else
            echo "FAIL: accelerators.37000 missing Control+KeyF / Control+Shift+KeyF, got $accel"
            fail=1
          fi
        done
        exit $fail

  dev:build:
    desc: Build dev container
    cmd: docker build --file dev-image/Dockerfile.dev -t dev-image --progress=plain .

  dev:container:
    desc: Run a dev container
    cmds:
      - mkdir -p ~/yolo-exchange
      - docker run -it -v ~/yolo-exchange:/root/yolo-exchange -v ~/.claude/.credentials.json:/root/.claude/.credentials.json -v /tmp/notify-forward:/tmp/notify-forward {{.CLI_ARGS}} dev-image:latest zsh

  tailscale:get_acl:
    desc: Get current Tailscale ACL policy
    requires:
      vars: [TAILSCALE_API_KEY, TAILSCALE_TAILNET]
    cmd: >-
      http GET "https://api.tailscale.com/api/v2/tailnet/{{.TAILSCALE_TAILNET}}/acl"
      -a "{{.TAILSCALE_API_KEY}}:"
      Accept:application/hujson

  tailscale:api:
    desc: |
      Generic Tailscale API call. Auth is injected automatically.
      Usage: task tailscale:api -- <method> <url> [httpie args...]
      Examples:
        task tailscale:api -- GET https://api.tailscale.com/api/v2/tailnet/-/devices
        task tailscale:api -- GET https://api.tailscale.com/api/v2/tailnet/-/acl Accept:application/hujson
    requires:
      vars: [TAILSCALE_API_KEY]
    cmd: http -a "{{.TAILSCALE_API_KEY}}:" {{.CLI_ARGS}}

  tailscale:put_acl:
    desc: Apply Tailscale ACL policy from tailscale/acl.hujson
    requires:
      vars: [TAILSCALE_API_KEY, TAILSCALE_TAILNET]
    cmd: >-
      http POST "https://api.tailscale.com/api/v2/tailnet/{{.TAILSCALE_TAILNET}}/acl"
      -a "{{.TAILSCALE_API_KEY}}:"
      Content-Type:application/hujson
      < tailscale/acl.hujson

  llm:keys:
    desc: Set LLM API keys from agenix secrets
    cmds:
      - llm keys set gemini --value "$(cat /run/agenix/llm-gemini-key)"
